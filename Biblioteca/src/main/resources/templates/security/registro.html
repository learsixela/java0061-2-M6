<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" >
  </head>
<body>
    <div class="container">

		<h1 th:text="${titulo}"></h1>
		
		<form action="#" th:action="@{/registrar}" th:object="${userDTO}" method="post">
			<input type="hidden" th:field="*{id}">
			<div class="mb-3">
				<label for="username" class="form-label">Username</label>
				<input type="text" th:field="*{username}" class="form-control">
			</div>
			<div class="mb-3">
				<label for="role" class="form-label">ROL: </label>
				<input type="text" th:field="*{role}" class="form-control">
			</div>			
			<div class="mb-3">
				<label for="email" class="form-label">Email</label>
				<input type="email" th:field="*{email}" class="form-control">
			</div>
			<div class="mb-3">
				<label for="password" class="form-label">Password</label>
				<input type="password" th:field="*{password}" class="form-control">
			</div>
			<div class="mb-3">
				<label for="passwordConfirmation" class="form-label">Repita Password</label>
				<input type="password" th:field="*{passwordConfirmation}" class="form-control">
			</div>
			<button type="submit" class="btn btn-primary" th:text="${titulo}">Registrar</button>
			<a th:href="@{/}" class="btn btn-secondary">volver</a>
		</form>
		
	</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
