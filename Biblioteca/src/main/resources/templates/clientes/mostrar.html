<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" >
  </head>
<body>
    <div class="container">
		<h1>
			Clientes	
		</h1>
		<hr>
		
		<div class="row">
			<div class="col">
				<a th:href="@{/clientes/nuevo}" class="btn btn-success">Nuevo Cliente</a>
			</div>
			<div class="col">
				<form class="d-flex" role="search" action="#" th:action="@{/clientes/buscar}" method="get">
					<input class="form-control me-2" type="search" name="nick" placeholder="Buscar cliente por nick" aria-label="Search"/>
		        	<input class="form-control me-2" type="search" name="email" placeholder="Buscar cliente por email" aria-label="Search"/>
		        	<button class="btn btn-outline-success" type="submit">Buscar</button>
		      	</form>
			</div>
		</div>
		<div class="row">
			<div class="col">
				<form class="d-flex" role="search" action="#" th:action="@{/clientes/buscar2}" method="get">
		        	<input class="form-control me-2" type="search" name="parametro" placeholder="Buscar cliente por nick o email" aria-label="Search"/>
		        	<button class="btn btn-outline-success" type="submit">Buscar</button>
		      	</form>
			</div>
		</div>
		
		<!-- 
		<h2>Crear Cliente</h2>
		<form action="#" th:action="@{/clientes/guardar}" th:object="${cliente}" method="post">
		<div class="mb-3">
			<label for="nick" class="form-label">Nick</label>
			<input type="text" th:field="*{nick}" class="form-control">
		</div>
		<div class="mb-3">
			<label for="email" class="form-label">Email</label>
			<input type="text" th:field="*{email}" class="form-control">
		</div>
			<button type="submit" class="btn btn-primary">Crear Cliente</button>
		</form>
		-->
		<br><hr>
		<h2>Lista de Clientes</h2>
		<table class="table">
			<thead>
				<tr>
					<th>ID</th>
					<th>Nick</th>
					<th>Email</th>
					<th>Acciones</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="cliente : ${listaClientes}">
					<td  th:text="${cliente.id}"> </td>
					<td  th:text="${cliente.nick}"> </td>
					<td  th:text="${cliente.email}"> </td>
					<td>
					<a th:href="@{/clientes/editar/{id} (id=${cliente.id})  }">Editar</a>
					<a th:href="@{/clientes/editar?id={id} (id=${cliente.id})  }">Editar</a> - 
					
					<a th:href="@{/clientes/eliminar/{id} (id=${cliente.id})  }">Eliminar</a>
					</td>
				</tr>
			</tbody>
		</table>
	</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
