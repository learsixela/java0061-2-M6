<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" >
  </head>
<body>
    <div class="container">
		<h1>
			Clientes	
		</h1>
		<hr>
		<h2 th:text="${titulo}"></h2>
		
		<form action="#" th:action="@{/clientes/guardar}" th:object="${cliente}" method="post">
		<input type="hidden" th:field="*{id}">
		<div class="mb-3">
			<label for="nick" class="form-label">Nick</label>
			<input type="text" th:field="*{nick}" class="form-control">
		</div>
		<div class="mb-3">
			<label for="email" class="form-label">Email</label>
			<input type="text" th:field="*{email}" class="form-control">
		</div>
			<button type="submit" class="btn btn-primary" th:text="${titulo}">Cliente</button>
			<a th:href="@{/clientes}" class="btn btn-secondary">volver</a>
		</form>
		
	</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
