<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" >
  </head>
<body>
    <div class="container">
		<h1>
			Libros	
		</h1>
		<hr>
				<div class="row">
			<div class="col">
				<a th:href="@{/libros/crear}" class="btn btn-success">Nuevo Libro</a>
			</div>
			<div class="col">
			</div>
			</div>
		<br><hr>
		<h2>Lista de autores</h2>
		<table class="table">
			<thead>
				<tr>
					<th>ID</th>
					<th>Nombre</th>
					<th>Nacionalidad</th>
					<th>Libros</th>
					<th>Acciones</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="autor : ${listaAutores}">
					<td  th:text="${autor.id}"> </td>
					<td  th:text="${autor.nombre}"> </td>
					<td  th:text="${autor.nacionalidad}"> </td>
					<!-- como visualizar los libros por autor -->
					<td>
						<ul>
					        <li th:each="libro : ${autor.libros}"
					            th:text="${libro.titulo}">
					        </li>
					    </ul>
					</td>
					<td>
						<!-- editar y eliminar -->
					</td>
				</tr>
			</tbody>
		</table>
	</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
