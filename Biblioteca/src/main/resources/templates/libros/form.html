<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" >
  </head>
<body>
    <div class="container">
		<h1>
			Libros	
		</h1>
		<hr>
		<h2 th:text="${titulo}"></h2>
		
		<form action="#" th:action="@{/libros/guardar}" th:object="${libro}" method="post">
		<input type="hidden" th:field="*{id}">
		<div class="mb-3">
			<label for="isbn" class="form-label">ISBN</label>
			<input type="text" th:field="*{isbn}" class="form-control">
		</div>
		<div class="mb-3">
			<label for="titulo" class="form-label">Titulo</label>
			<input type="text" th:field="*{titulo}" class="form-control">
		</div>
		<div class="mb-3">
		<label for="autor" class="form-label">Autor:</label>
		    <select id="autor" th:field="*{autor}" class="form-control">
		        <option value="" disabled>Selecciona un autor</option>
		        <option th:each="autor : ${autores}"
		                th:value="${autor.id}"
		                th:text="${autor.nombre}">
		        </option>
		    </select>
		
		</div>
			<button type="submit" class="btn btn-primary" th:text="${titulo}">Libro</button>
			<a th:href="@{/libros}" class="btn btn-secondary">volver</a>
		</form>
		
	</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
